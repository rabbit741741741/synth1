<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SynthLab — limpar cache</title>
  <style>
    body{background:#000;color:#e0e0e0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;max-width:720px;margin:0 auto;padding:32px;line-height:1.55}
    .box{border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:20px;background:#121212}
    button,a{display:inline-block;margin-top:12px;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.24);background:#1e1e1e;color:#e0e0e0;text-decoration:none;font-weight:700}
    .ok{color:#7ed8a8}.warn{color:#c5a059}
  </style>
</head>
<body>
  <div class="box">
    <h1>SynthLab — limpar versão antiga</h1>
    <p>Esta página remove service workers, caches e estado local antigos desta PWA e depois abre a versão v6.4.</p>
    <p id="status" class="warn">A limpar...</p>
    <button id="again">Limpar novamente</button>
    <a href="index.html?v=6_3_manual">Abrir v6.4 manualmente</a>
  </div>
  <script>
    async function clearSynthLab() {
      const status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(n => caches.delete(n)));
        }
        try { localStorage.clear(); } catch(e) {}
        try { sessionStorage.clear(); } catch(e) {}
        status.textContent = 'Limpeza concluída. A abrir v6.4...';
        status.className = 'ok';
        setTimeout(() => { location.href = 'index.html?v=6_3_' + Date.now(); }, 900);
      } catch (err) {
        status.textContent = 'Não consegui limpar tudo automaticamente. Usa o botão para abrir a v6.4 manualmente.';
        console.error(err);
      }
    }
    document.getElementById('again').addEventListener('click', clearSynthLab);
    clearSynthLab();
  </script>
</body>
</html>
